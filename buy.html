<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACT — Buy in</title>
<script>
  (function () {
    try {
      var s = localStorage.getItem('bc-theme');
      var d = s ? s === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
      if (d) document.documentElement.classList.add('dark');
      var f = localStorage.getItem('bc-font');
      if (f && f !== 'mono') document.documentElement.setAttribute('data-font', f);
    } catch (e) {}
  })();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class', theme: { extend: { fontWeight: { bold: '600' }, colors: { ok: 'var(--ok)', pending: 'var(--pending)', danger: 'var(--danger)' } } } };</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<style>
  .notice { border: 1px dotted var(--line-dotted); padding: 16px; text-align: center; }
  .debug-toggle { position: fixed; top: 60px; right: 16px; z-index: 10; height: 36px; display: flex; align-items: center; font-family: inherit; font-size: 11px; color: var(--muted); background: var(--paper); border: 1px dashed var(--line-dotted); padding: 0 10px; cursor: pointer; }
  .debug-toggle:hover { color: var(--ink); }
</style>
</head>
<body>
  <div class="top-controls">
    <button id="walletToggle" class="wallet-toggle" type="button">Connect wallet</button>
    <button id="fontToggle" class="font-toggle" aria-label="Toggle font">Aa</button>
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle light / dark">
      <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
  </div>
  <button id="debugToggle" class="debug-toggle">debug</button>

  <div class="min-h-screen flex justify-center items-start py-12 px-4">
    <div class="paper w-full max-w-[820px] px-10 py-12 sm:px-16 sm:py-16 text-[14px] leading-[1.65]">
      <div id="app"></div>
    </div>
  </div>

<script src="api.js"></script>
<script src="wallet.js"></script>
<script>
const $ = id => document.getElementById(id);
const app = $('app');
const params = new URLSearchParams(location.search);
const raiseId = params.get('r'), allocId = params.get('a');
const TOTAL_SHARES = 1000;
let currentRaise = null;
let connectedWallet = null;

const fmtMoney = n => '$' + Math.round(n).toLocaleString('en-US');
const fmtTokens = n => Math.round(n).toLocaleString('en-US');
const fmtPct = v => (Math.round(v * 10) / 10).toString().replace(/\.0$/, '') + '%';
const fmtPrice = p => '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = ts => new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
const esc = s => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const relDays = ts => { const d = Math.ceil((ts - Date.now()) / 86400000); return d > 1 ? 'in ' + d + ' days' : d === 1 ? 'in 1 day' : d === 0 ? 'today' : d === -1 ? '1 day ago' : Math.abs(d) + ' days ago'; };

async function loadRaise() {
  if (!raiseId) {
    currentRaise = null;
    render();
    return;
  }
  try {
    currentRaise = await PactAPI.getRaise(raiseId);
  } catch (err) {
    currentRaise = null;
  }
  render();
}

function fractionAt(r, R) {
  const cap = r.valuation.effectiveCap, vMin = r.valuation.floor, vMax = r.valuation.ceiling;
  const F = r.maxDilutionPct / 100, rmax = r.raise.max;
  if (R <= 0) return 0;
  if (R >= rmax) return F;
  if (vMax === vMin) return Math.min(R / cap, F);
  const a = (vMax - vMin) / (2 * F);
  return Math.min((-vMin + Math.sqrt(vMin * vMin + 4 * a * R)) / (2 * a), F);
}
const tokensBetween = (r, R0, R1) => (fractionAt(r, R1) - fractionAt(r, R0)) * r.totalTokens;
const fundedTotal = r => r.allocations.filter(a => a.status === 'funded').reduce((s, a) => s + a.amountUsd, 0);

function tokensForFunded(r, alloc) {
  const funded = r.allocations.filter(x => x.status === 'funded').sort((a, b) => (a.fundedAt || 0) - (b.fundedAt || 0));
  let cum = 0;
  for (const x of funded) {
    if (x.id === alloc.id) return tokensBetween(r, cum, cum + x.amountUsd);
    cum += x.amountUsd;
  }
  return 0;
}

function notice(title, body) {
  app.innerHTML = `<div class="notice"><div class="font-bold mb-1">${esc(title)}</div><div class="t-muted text-[13px]">${body}</div></div>`;
}

function render() {
  const r = currentRaise;
  if (!r) return notice('Link not found', 'This buy-in link doesn’t match any known offering.');
  const a = (r.allocations || []).find(x => x.id === allocId);
  if (!a) return notice('Link not found', 'This allocation no longer exists — the project may have removed it.');

  const funded = fundedTotal(r);
  const closeDate = r.createdAt + r.minimum.deadlineDays * 86400000;
  const raiseClosed = funded >= r.raise.max || Date.now() > closeDate;
  const isPaid = a.status === 'funded';
  const tokens = isPaid ? tokensForFunded(r, a) : tokensBetween(r, funded, funded + a.amountUsd);
  const pricePer = tokens > 0 ? a.amountUsd / tokens : 0;
  const gap = r.raise.min - funded;
  const secured = gap <= 0;
  const statusWord = raiseClosed ? 'Closed' : 'Open';
  const note = secured ? 'secured' : (!raiseClosed ? fmtMoney(gap) + ' below threshold' : 'below threshold — refund');
  const noteColor = secured ? 'var(--ok)' : (!raiseClosed ? 'var(--pending)' : 'var(--danger)');

  const head = `
    <div class="mb-8">
      <h1 class="text-lg font-bold">${esc(r.projectName)}</h1>
      <p class="text-[13px] t-muted mt-1">This is a Purchase Agreement for Community Tokens (a &ldquo;PACT&rdquo;). You&rsquo;re buying community tokens that align holders with the project and carry no inherent value of their own. Your purchase is refundable in full if the round doesn&rsquo;t reach its minimum threshold of ${fmtMoney(r.raise.min)} by ${fmtDate(closeDate)}.</p>
    </div>`;

  const txHash = '0x7a3f9c8e2b1d4f60a9e7c3518d2bf04a6e1c9b7d3f80a25e4c6917bd3f02a8c1';
  const txShort = txHash.slice(0, 10) + '…' + txHash.slice(-8);

  const purchaseDetails = `
    <div class="font-bold mb-2">${isPaid ? 'Purchase details' : 'Allocation details'}</div>
    <dl class="deflist mb-5">
      <dt>Buyer</dt><dd>${esc(a.name)}</dd>
      <dt>Amount</dt><dd>${fmtMoney(a.amountUsd)}</dd>
      <dt>Status</dt><dd class="flex items-baseline space-x-2"><span class="${isPaid ? 'text-ok' : 'text-pending'}">${isPaid ? 'Purchased' : 'Not yet purchased'}</span>${isPaid ? `<span class="t-muted">Transaction ID: ${txShort}</span>` : ''}</dd>
      <dt>Ownership</dt><dd class="flex items-baseline space-x-2"><span>${isPaid ? '' : '~'}${fmtPct(tokens / r.totalTokens * 100)}</span><span class="t-muted">${fmtTokens(tokens)} tokens</span></dd>
    </dl>`;

  const roundDetails = `
    <div class="font-bold mb-2">Offering details</div>
    <dl class="deflist mb-8">
      <dt>Raising</dt><dd>${r.raise.min !== r.raise.max ? 'Up to ' : ''}${fmtMoney(r.raise.max)} on ${fmtMoney(r.valuation.effectiveCap)} post-money</dd>
      <dt>Close date</dt><dd class="flex items-baseline space-x-2"><span>${fmtDate(closeDate)}</span><span class="t-muted">${relDays(closeDate)}</span></dd>
    </dl>`;

  let action;
  if (isPaid) {
    action = '';
  } else if (raiseClosed) {
    action = `<div class="notice mb-8">This offering has closed. No further buy-ins can be made.</div>`;
  } else if (!connectedWallet) {
    action = `<div class="notice mb-8">Connect a wallet before purchasing this offering.</div>`;
  } else {
    action = `<div class="flex justify-end mb-8"><button class="cta px-6 py-3 text-[14px] font-semibold" data-act="pay">Purchase ${esc(r.projectName)}</button></div>`;
  }

  app.innerHTML = head + roundDetails + purchaseDetails + action;

  const dbgBtn = $('debugToggle');
  if (dbgBtn) dbgBtn.textContent = isPaid ? 'debug · mark unpaid' : 'debug · mark paid';
}

app.addEventListener('click', async e => {
  if (!e.target.closest('[data-act="pay"]')) return;
  if (!connectedWallet) {
    notice('Wallet required', 'Connect a wallet before purchasing this offering.');
    return;
  }
  const r = currentRaise;
  const a = r && (r.allocations || []).find(x => x.id === allocId);
  if (!a) return;
  try {
    const result = await PactAPI.fundAllocation(r.id, a.id, connectedWallet);
    currentRaise = result.raise;
    render();
  } catch (err) {
    notice('Purchase failed', esc(err.message || 'Could not complete purchase.'));
  }
});

// dev-only: flip this allocation between unpaid and paid
const dbg = $('debugToggle');
if (['localhost', '127.0.0.1'].includes(location.hostname)) {
  dbg.addEventListener('click', () => {
    const r = currentRaise;
    const a = r && (r.allocations || []).find(x => x.id === allocId);
    if (!a) return;
    const req = a.status === 'funded' ? PactAPI.unfundAllocation(r.id, a.id) : PactAPI.fundAllocation(r.id, a.id, connectedWallet);
    req.then(result => { currentRaise = result.raise; render(); })
      .catch(err => notice('Debug update failed', esc(err.message || 'Could not update allocation.')));
  });
} else {
  dbg.style.display = 'none';
}

$('themeToggle').addEventListener('click', () => {
  const dark = document.documentElement.classList.toggle('dark');
  try { localStorage.setItem('bc-theme', dark ? 'dark' : 'light'); } catch (e) {}
  render();
});
const FONTS = ['mono', 'serif', 'sans'];
const FONT_NAMES = { mono: 'Mono', serif: 'Serif', sans: 'Sans' };
function applyFontTitle() { $('fontToggle').title = 'Font: ' + FONT_NAMES[document.documentElement.getAttribute('data-font') || 'mono']; }
applyFontTitle();
$('fontToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-font') || 'mono';
  const next = FONTS[(FONTS.indexOf(cur) + 1) % FONTS.length];
  if (next === 'mono') document.documentElement.removeAttribute('data-font');
  else document.documentElement.setAttribute('data-font', next);
  try { localStorage.setItem('bc-font', next); } catch (e) {}
  applyFontTitle();
  render();
});

PactWallet.init({
  buttonId: 'walletToggle',
  onChange: account => {
    connectedWallet = account;
    render();
  },
  onError: err => notice('Wallet unavailable', esc(err.message || 'Could not connect wallet.')),
});
loadRaise();
</script>
<script>
  if (['localhost', '127.0.0.1'].includes(location.hostname)) {
    const watch = [location.href, 'app.css'];
    let stamp = null;
    setInterval(async () => {
      try {
        const tags = await Promise.all(watch.map(u => fetch(u, { method: 'HEAD', cache: 'no-store' }).then(r => r.headers.get('last-modified') || r.headers.get('etag') || '')));
        const t = tags.join('|');
        if (stamp && t !== stamp) location.reload();
        stamp = t;
      } catch (e) {}
    }, 1000);
  }
</script>
</body>
</html>
