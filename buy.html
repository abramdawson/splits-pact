<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACT — Buy in</title>
<script>
  (function () {
    try {
      var style = localStorage.getItem('bc-style');
      if (!style) {
        var f = localStorage.getItem('bc-font');
        var t = localStorage.getItem('bc-theme');
        style = f === 'serif' ? 'chambers' : (t === 'dark' || f === 'mono' ? 'cipher' : 'clarity');
      }
      if (style && style !== 'clarity') document.documentElement.setAttribute('data-style', style);
      if (style === 'cipher') document.documentElement.classList.add('dark');
    } catch (e) {}
  })();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class', theme: { extend: { fontWeight: { bold: '600' }, colors: { ok: 'var(--ok)', pending: 'var(--pending)', danger: 'var(--danger)' } } } };</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Newsreader:opsz,wght@6..72,200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<style>
  .notice { border: 1px dotted var(--line-dotted); padding: 16px; text-align: center; color: var(--ink); }
  .status-value { display: flex; align-items: center; gap: 0.5rem; }
  .status-state { display: inline-flex; align-items: center; gap: 6px; }
  .status-dot { width: 14px; height: 14px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; background: var(--ok); color: #fff; flex: 0 0 auto; }
  .status-dot.refundable { background: var(--pending); }
  .status-dot svg { width: 10px; height: 10px; }
  .value-link { color: inherit; text-decoration: none; }
  .value-link:hover { color: var(--marker); text-decoration: underline; }
  .debug-menu { position: fixed; right: 16px; bottom: 16px; z-index: 30; display: none; }
  .debug-menu.show { display: block; }
  .debug-toggle { height: 32px; padding: 0 10px; border: 0; border-radius: var(--radius-default); background: var(--ink); color: var(--paper); font-family: inherit; font-size: 12px; cursor: pointer; }
  .debug-panel { position: absolute; right: 0; bottom: 40px; width: 190px; padding: 2px; border-radius: var(--radius-default); background: #202020; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,.18); opacity: 0; pointer-events: none; transform: translateY(4px); transition: opacity 120ms ease, transform 120ms ease; }
  .debug-panel.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .debug-label { padding: 6px 8px 4px; color: rgba(255,255,255,.55); font-size: 11px; font-weight: 500; }
  .debug-panel button { width: 100%; display: flex; align-items: center; justify-content: space-between; border: 0; border-radius: var(--radius-small); padding: 5px 8px; background: transparent; color: #fff; font-family: inherit; font-size: 12px; cursor: pointer; text-align: left; }
  .debug-panel button:hover { background: var(--marker); }
  .debug-check { width: 12px; height: 12px; opacity: 0; position: relative; }
  .debug-check::after { content: ''; position: absolute; left: 3px; top: 1px; width: 5px; height: 9px; border: solid currentColor; border-width: 0 2px 2px 0; transform: rotate(45deg); }
  .debug-panel button.active .debug-check { opacity: 1; }
</style>
</head>
<body>
  <div class="top-controls">
    <button id="walletToggle" class="wallet-toggle" type="button">Connect wallet</button>
    <button id="settingsToggle" class="settings-toggle" type="button" aria-label="Settings" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.7 3.4 10.5 2h3l.8 1.4 1.8.7 1.5-.4 2.1 2.1-.4 1.5.7 1.8 1.4.8v3l-1.4.8-.7 1.8.4 1.5-2.1 2.1-1.5-.4-1.8.7-.8 1.4h-3l-.8-1.4-1.8-.7-1.5.4-2.1-2.1.4-1.5-.7-1.8L2 13.5v-3l1.4-.8.7-1.8-.4-1.5 2.1-2.1 1.5.4 1.8-.7Z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
  <div class="min-h-screen flex justify-center items-start pt-20 pb-12 px-4">
    <div class="paper w-full max-w-xl px-10 py-12 sm:px-16 sm:py-16 text-[14px] leading-[1.65]">
      <div id="app"></div>
    </div>
  </div>
  <div id="debugMenu" class="debug-menu">
    <button id="debugToggle" class="debug-toggle" type="button">Debug</button>
    <div id="debugPanel" class="debug-panel">
      <div class="debug-label">Offering state</div>
      <button type="button" data-debug-state="live"><span>Live</span><span class="debug-check" aria-hidden="true"></span></button>
      <button type="button" data-debug-state="funding"><span>Funding</span><span class="debug-check" aria-hidden="true"></span></button>
      <button type="button" data-debug-state="failed"><span>Failed</span><span class="debug-check" aria-hidden="true"></span></button>
      <button type="button" data-debug-state="refunded"><span>Refunded</span><span class="debug-check" aria-hidden="true"></span></button>
      <button type="button" data-debug-state="closed"><span>Closed</span><span class="debug-check" aria-hidden="true"></span></button>
    </div>
  </div>

<script src="api.js"></script>
<script src="wallet.js"></script>
<script src="dist/onchain.bundle.js"></script>
<script src="settings.js"></script>
<script>
const $ = id => document.getElementById(id);
const app = $('app');
const params = new URLSearchParams(location.search);
const raiseId = params.get('r'), allocId = params.get('a');
const TOTAL_SHARES = 1000;
let currentRaise = null;
let connectedWallet = null;
let onchainReceiptState = null;
let onchainOfferingState = null;
let debugOfferingState = 'live';

function fmtMoney(n) {
  const value = Number(n) || 0;
  const hasCents = Math.abs(value - Math.round(value)) > 0.000001 || (value > 0 && value < 1);
  return '$' + value.toLocaleString('en-US', {
    minimumFractionDigits: hasCents ? 2 : 0,
    maximumFractionDigits: 2,
  });
}
const fmtDollars = n => '$' + (Number(n) || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtTokens = n => Math.round(n).toLocaleString('en-US');
const fmtPct = v => (Math.round(v * 10) / 10).toFixed(1) + '%';
const fmtPrice = p => '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const usdcBaseUnitsToDollars = n => Number(n || 0) / 1_000_000;
const fmtDate = ts => new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
const esc = s => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const relDays = ts => { const d = Math.ceil((ts - Date.now()) / 86400000); return d > 1 ? 'in ' + d + ' days' : d === 1 ? 'in 1 day' : d === 0 ? 'today' : d === -1 ? '1 day ago' : Math.abs(d) + ' days ago'; };
const isTxHash = value => /^0x[a-fA-F0-9]{64}$/.test(String(value || ''));
const basescanTx = hash => 'https://basescan.org/tx/' + encodeURIComponent(hash);
const basescanAddress = address => 'https://basescan.org/address/' + encodeURIComponent(address);
const shortAddr = a => a && a.length > 12 ? a.slice(0, 6) + '…' + a.slice(-4) : (a || '');

async function loadRaise() {
  if (!raiseId) {
    currentRaise = null;
    render();
    return;
  }
  try {
    currentRaise = await PactAPI.getRaise(raiseId);
  } catch (err) {
    currentRaise = null;
  }
  onchainReceiptState = null;
  onchainOfferingState = null;
  render();
  refreshOnchainOffering();
  refreshOnchainReceipt();
}

function fractionAt(r, R) {
  const cap = r.valuation.effectiveCap, vMin = r.valuation.floor, vMax = r.valuation.ceiling;
  const F = r.maxDilutionPct / 100, rmax = r.raise.max;
  if (R <= 0) return 0;
  if (R >= rmax) return F;
  if (vMax === vMin) return Math.min(R / cap, F);
  const a = (vMax - vMin) / (2 * F);
  return Math.min((-vMin + Math.sqrt(vMin * vMin + 4 * a * R)) / (2 * a), F);
}
const tokensBetween = (r, R0, R1) => (fractionAt(r, R1) - fractionAt(r, R0)) * r.totalTokens;
const fundedTotal = r => r.allocations.filter(a => a.status === 'funded').reduce((s, a) => s + a.amountUsd, 0);

function offeringCurveParams(r) {
  if (r && r.curveParams && Number(r.curveParams.priceStart) > 0) return r.curveParams;
  const floor = Number(r && r.valuation && r.valuation.floor);
  const ceiling = Number(r && r.valuation && r.valuation.ceiling);
  const offeringUnits = Number(r && r.newMoney && r.newMoney.tokens);
  if (!(floor > 0) || !(ceiling >= floor) || !(offeringUnits > 0)) return null;
  const priceStart = Math.max(1, Math.floor(floor * 1000000 / 1000));
  const slopeRaw = Math.floor((ceiling - floor) * 1000000 / 1000 / offeringUnits);
  const priceSlope = ceiling > floor ? Math.max(1, slopeRaw) : 0;
  return { priceStart, priceSlope };
}

function costForUnits(curve, sold, units) {
  if (!curve || !(units > 0)) return 0;
  return units * Number(curve.priceStart || 0) + Number(curve.priceSlope || 0) * (sold * units + (units * (units - 1)) / 2);
}

function quoteAllocationFromState(curve, state, amountUsd) {
  if (!curve || !state) return null;
  const budget = Math.floor(Number(amountUsd || 0) * 1000000);
  let units = 0;
  const remaining = Number(state.remainingUnits || 0);
  const sold = Number(state.unitsSold || 0);
  for (let candidate = 1; candidate <= remaining; candidate++) {
    const cost = costForUnits(curve, sold, candidate);
    if (cost > budget) break;
    units = candidate;
  }
  return { units, cost: costForUnits(curve, sold, units) };
}

function valuationForUnitIndex(curve, unitIndex, totalTokens) {
  if (!curve) return 0;
  const price = Number(curve.priceStart || 0) + Number(curve.priceSlope || 0) * Math.max(0, Number(unitIndex || 0));
  return price * Number(totalTokens || 0) / 1000000;
}

function debugActive() {
  return ['localhost', '127.0.0.1'].includes(location.hostname) && debugOfferingState !== 'live';
}

function debugOfferingSnapshot(r, allocation, live) {
  if (!debugActive()) return live;
  const curveUnits = Number(r && r.newMoney && r.newMoney.tokens || 0);
  const base = {
    remainingUnits: curveUnits,
    unitsSold: 0,
    minMet: false,
    state: 0,
    raised: 0,
    withdrawn: 0,
    raiseMin: Math.round(Number(r && r.raise && r.raise.min || 0) * 1000000),
    closeDate: Math.floor((Date.now() + 7 * 86400000) / 1000),
    deposit: allocation && allocation.status === 'funded'
      ? Number(allocation.purchaseCostUsdcBaseUnits || Math.round(Number(allocation.amountUsd || 0) * 1000000))
      : 0,
    ...(live || {}),
  };
  if (debugOfferingState === 'funding') return { ...base, state: 0, minMet: false };
  if (debugOfferingState === 'failed') return { ...base, state: 1, minMet: false, closeDate: Math.floor((Date.now() - 86400000) / 1000) };
  if (debugOfferingState === 'refunded') return { ...base, state: 1, minMet: false, closeDate: Math.floor((Date.now() - 86400000) / 1000), deposit: 0 };
  if (debugOfferingState === 'closed') return { ...base, state: 2, minMet: true };
  return live;
}

function tokensForFunded(r, alloc) {
  const funded = r.allocations.filter(x => x.status === 'funded').sort((a, b) => (a.fundedAt || 0) - (b.fundedAt || 0));
  let cum = 0;
  for (const x of funded) {
    if (x.id === alloc.id) return tokensBetween(r, cum, cum + x.amountUsd);
    cum += x.amountUsd;
  }
  return 0;
}

function receiptKey(r, allocation) {
  return [
    r && r.id,
    allocation && allocation.id,
    r && r.liquidSplitAddress,
    allocation && allocation.buyerWallet,
  ].join(':');
}

async function refreshOnchainReceipt() {
  const r = currentRaise;
  const a = r && (r.allocations || []).find(x => x.id === allocId);
  if (!r || !a || a.status !== 'funded' || !r.offeringAddress || !a.buyerWallet || !a.txHash || !window.PactLiquidSplit) return;
  const key = receiptKey(r, a);
  onchainReceiptState = { key, status: 'loading' };
  render();
  try {
    const purchase = await PactLiquidSplit.getOfferingPurchaseFromTx({
      offeringAddress: r.offeringAddress,
      txHash: a.txHash,
      buyer: a.buyerWallet,
      provider: PactWallet.provider,
    });
    onchainReceiptState = { key, status: 'loaded', tokens: Number(purchase.units), cost: Number(purchase.cost) };
  } catch (err) {
    onchainReceiptState = { key, status: 'error', error: err.message || 'Could not read onchain ownership.' };
  }
  render();
}

async function refreshOnchainOffering() {
  const r = currentRaise;
  if (!r || !r.offeringAddress || !window.PactLiquidSplit) return;
  try {
    const state = await PactLiquidSplit.getOfferingState({
      offeringAddress: r.offeringAddress,
      buyer: connectedWallet || undefined,
      provider: PactWallet.provider,
    });
    onchainOfferingState = { status: 'loaded', ...state };
  } catch (err) {
    onchainOfferingState = { status: 'error', error: err.message || 'Could not read offering state.' };
  }
  render();
}

function notice(title, body) {
  app.innerHTML = `<div class="notice"><div class="font-bold mb-1">${esc(title)}</div><div class="t-muted text-[13px]">${body}</div></div>`;
}

function render() {
  const r = currentRaise;
  if (!r) return notice('Link not found', 'This buy-in link doesn’t match any known offering.');
  const a = (r.allocations || []).find(x => x.id === allocId);
  if (!a) return notice('Link not found', 'This allocation no longer exists — the project may have removed it.');
  document.title = `${r.projectName} | ${a.name}`;

  const funded = fundedTotal(r);
  const liveOfferingState = onchainOfferingState && onchainOfferingState.status === 'loaded' ? onchainOfferingState : null;
  const offeringState = debugOfferingSnapshot(r, a, liveOfferingState);
  const closeDate = offeringState && offeringState.closeDate ? offeringState.closeDate * 1000 : r.createdAt + r.minimum.deadlineDays * 86400000;
  const offeringFailed = offeringState && offeringState.state === 1;
  const debugRefunded = debugOfferingState === 'refunded';
  const offeringClosed = offeringState && offeringState.state === 2;
  const raiseClosed = offeringState ? offeringFailed || offeringClosed || (offeringState.state === 0 && Date.now() > closeDate && !offeringState.minMet) : funded >= r.raise.max || Date.now() > closeDate;
  const curve = offeringCurveParams(r);
  const remainingUnits = offeringState ? Number(offeringState.remainingUnits || 0) : Math.max(0, Number(r.newMoney && r.newMoney.tokens || 0) - tokensBetween(r, 0, funded));
  const remainingCapacity = offeringState && curve ? usdcBaseUnitsToDollars(costForUnits(curve, Number(offeringState.unitsSold || 0), remainingUnits)) : Math.max(0, r.raise.max - funded);
  const raisedTotal = offeringState ? usdcBaseUnitsToDollars(offeringState.raised) : funded;
  const raiseCapacity = offeringState && curve ? Math.max(raisedTotal + remainingCapacity, r.raise.min, raisedTotal) : r.raise.max;
  const valuationStart = curve ? valuationForUnitIndex(curve, 0, r.totalTokens) : r.valuation.floor;
  const valuationEnd = curve ? valuationForUnitIndex(curve, Number(offeringState && offeringState.unitsSold || 0) + remainingUnits, r.totalTokens) : r.valuation.ceiling;
  const isPaid = a.status === 'funded';
  const localTokens = isPaid ? tokensForFunded(r, a) : tokensBetween(r, funded, funded + a.amountUsd);
  const receiptState = onchainReceiptState && onchainReceiptState.key === receiptKey(r, a) ? onchainReceiptState : null;
  const dbTokens = Number(a.tokensPurchased || 0);
  const dbCostBaseUnits = Number(a.purchaseCostUsdcBaseUnits || 0);
  const hasPurchaseData = isPaid && dbTokens > 0 && dbCostBaseUnits > 0;
  const hasOnchainReceipt = isPaid && receiptState && receiptState.status === 'loaded';
  const purchasedTokens = hasPurchaseData ? dbTokens : (hasOnchainReceipt ? receiptState.tokens : localTokens);
  const purchaseCost = hasPurchaseData ? usdcBaseUnitsToDollars(dbCostBaseUnits) : (hasOnchainReceipt ? usdcBaseUnitsToDollars(receiptState.cost) : a.amountUsd);
  const allocationQuote = !isPaid && offeringState && curve ? quoteAllocationFromState(curve, offeringState, a.amountUsd) : null;
  const allocationQuoteLoading = !isPaid && r.offeringAddress && !offeringState;
  const allocationTokens = isPaid ? (localTokens || purchasedTokens) : (allocationQuote ? allocationQuote.units : tokensBetween(r, funded, funded + a.amountUsd));
  const allocationCost = allocationQuote ? usdcBaseUnitsToDollars(allocationQuote.cost) : a.amountUsd;
  const allocationPricePer = allocationTokens > 0 ? allocationCost / allocationTokens : 0;
  const pricePer = purchasedTokens > 0 ? purchaseCost / purchasedTokens : 0;
  const refundAmount = usdcBaseUnitsToDollars(Number(a.purchaseCostUsdcBaseUnits || 0) || Math.round(Number(a.amountUsd || 0) * 1000000));
  const refundableDeposit = offeringFailed && connectedWallet && offeringState && Number(offeringState.deposit || 0) > 0 ? usdcBaseUnitsToDollars(offeringState.deposit) : 0;
  const refundAccount = a.buyerWallet || '';
  const needsRefundAccount = refundAccount && (!connectedWallet || String(connectedWallet).toLowerCase() !== String(refundAccount).toLowerCase());

  const head = `
    <div class="mb-8">
      <h1 class="text-lg font-bold">${esc(r.projectName)} | ${esc(a.name)}</h1>
      <p class="text-[13px] t-muted mt-1">This is a Purchase Agreement for Community Tokens (a &ldquo;PACT&rdquo;). You&rsquo;re buying community tokens that align holders with the project and carry no inherent value of their own.</p>
    </div>`;

  const txHash = isTxHash(a.txHash) ? a.txHash : '';
  const txLabel = txHash
    ? `<a class="linkbtn" href="${basescanTx(txHash)}" target="_blank" rel="noreferrer">View transaction</a>`
    : '<span class="t-muted">Recorded locally</span>';

  const allocationDetails = isPaid || offeringFailed || offeringClosed ? '' : `
    <div class="font-bold mb-2">Allocation details</div>
    <dl class="deflist mb-5">
      <dt>Amount</dt><dd>${fmtDollars(a.amountUsd)}</dd>
      <dt>Implied ownership</dt><dd class="flex items-baseline space-x-2">${
        allocationQuoteLoading
          ? '<span class="t-muted">Loading...</span>'
          : `<span>${fmtPct(allocationTokens / r.totalTokens * 100)}</span><span class="t-muted">${fmtTokens(allocationTokens)} tokens</span>`
      }</dd>
      <dt>Price per token</dt><dd>${allocationQuoteLoading ? '<span class="t-muted">Loading...</span>' : fmtPrice(allocationPricePer)}</dd>
    </dl>`;

  const failedRefundCopy = debugRefunded
    ? 'This project failed to meet the minimum before the close date.'
    : (needsRefundAccount
      ? 'This project failed to meet the minimum before the close date. You can claim your full refund by connecting with the wallet used to purchase tokens.'
      : connectedWallet
      ? 'This project failed to meet the minimum before the close date. You can claim your full refund.'
      : 'This project failed to meet the minimum before the close date. Connect the refund account to claim your full refund.');
  const failedRefundNotice = isPaid && offeringFailed
    ? `<div class="notice mb-5 text-[13px]">${failedRefundCopy}</div>`
    : '';

  const purchaseDetails = isPaid && offeringFailed ? `
    <div class="font-bold mb-2">Refund details</div>
    <dl class="deflist mb-5">
      <dt>Status</dt><dd class="status-value"><span class="status-state"><span class="status-dot${debugRefunded ? '' : ' refundable'}" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${debugRefunded ? '<path d="m5 12 4 4L19 6"/>' : '<path d="M12 7v6"/><path d="M12 17h.01"/>'}</svg></span><span>${debugRefunded ? 'Refunded' : 'Refundable'}</span></span>${debugRefunded ? txLabel : ''}</dd>
      ${needsRefundAccount ? `<dt>Refund account</dt><dd><a class="value-link" href="${basescanAddress(refundAccount)}" target="_blank" rel="noreferrer">${shortAddr(refundAccount)}</a></dd>` : ''}
      <dt>Refund amount</dt><dd>${fmtDollars(refundAmount)}</dd>
    </dl>` : isPaid ? `
    <div class="font-bold mb-2">Purchase details</div>
    <dl class="deflist mb-5">
      <dt>Status</dt><dd class="status-value"><span class="status-state"><span class="status-dot" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 4 4L19 6"/></svg></span><span>Purchased</span></span>${txLabel}</dd>
      <dt>Amount</dt><dd>${fmtDollars(purchaseCost)}</dd>
      <dt>Ownership</dt><dd>${
        isPaid && receiptState && receiptState.status === 'loading'
          ? '<span class="t-muted">Loading onchain ownership...</span>'
          : `<span>${fmtPct(purchasedTokens / r.totalTokens * 100)}</span><span class="t-muted ml-2">${fmtTokens(purchasedTokens)} tokens</span>`
      }</dd>
      <dt>Price per token</dt><dd>${fmtPrice(pricePer)}</dd>
    </dl>` : '';

  const roundDetails = `
    <div class="font-bold mb-2">Offering details</div>
    <dl class="deflist mb-8">
      <dt>Raising</dt><dd class="flex items-baseline space-x-2"><span>Up to ${fmtDollars(raiseCapacity)}</span><span class="t-muted">${fmtDollars(r.raise.min)} minimum</span></dd>
      <dt>Valuation range</dt><dd>${fmtMoney(valuationStart)}–${fmtMoney(valuationEnd)} post-money</dd>
      <dt>Close date</dt><dd class="flex items-baseline space-x-2"><span>${fmtDate(closeDate)}</span><span class="t-muted">${relDays(closeDate)}</span></dd>
      <dt>Treasury</dt><dd>${r.proceedsAddress ? `<a class="value-link" href="${basescanAddress(r.proceedsAddress)}" target="_blank" rel="noreferrer">${shortAddr(r.proceedsAddress)}</a>` : '<span class="t-muted">Not set</span>'}</dd>
    </dl>`;

  let action;
  if (isPaid && offeringFailed && debugRefunded) {
    action = '';
  } else if (isPaid && offeringFailed && refundableDeposit > 0) {
    action = `<div class="flex justify-end mt-10"><button class="cta px-6 py-3 text-[14px] font-semibold" data-act="refund">Claim ${fmtDollars(refundableDeposit)} refund</button></div>`;
  } else if (isPaid) {
    action = '';
  } else if (raiseClosed) {
    action = `<div class="notice mt-10">${offeringFailed ? 'This project failed to meet the minimum before the close date.' : 'This offering has closed.'} No further buy-ins can be made.</div>`;
  } else if (!connectedWallet) {
    action = `<p class="text-[13px] t-muted mt-10 mb-3">Your purchase is refundable in full if the round does not reach its minimum of ${fmtDollars(r.raise.min)} by ${fmtDate(closeDate)}.</p><div class="notice">Connect a wallet before purchasing this offering.</div>`;
  } else {
    action = `<p class="text-[13px] t-muted mt-10 mb-3">Your purchase is refundable in full if the round does not reach its minimum of ${fmtDollars(r.raise.min)} by ${fmtDate(closeDate)}.</p><div class="flex justify-end"><button class="cta px-6 py-3 text-[14px] font-semibold" data-act="pay">${r.offeringAddress ? 'Purchase' : 'Mark purchased'} ${esc(r.projectName)}</button></div>`;
  }

  app.innerHTML = head + roundDetails + failedRefundNotice + allocationDetails + purchaseDetails + action;

}

app.addEventListener('click', async e => {
  const refundBtn = e.target.closest('[data-act="refund"]');
  if (refundBtn) {
    if (debugActive()) {
      refundBtn.textContent = 'Debug preview only';
      setTimeout(render, 900);
      return;
    }
    if (!connectedWallet) {
      notice('Wallet required', 'Connect the purchasing wallet before refunding.');
      return;
    }
    const r = currentRaise;
    if (!r || !r.offeringAddress || !window.PactLiquidSplit) return;
    refundBtn.disabled = true;
    refundBtn.textContent = 'Refunding...';
    try {
      await PactLiquidSplit.refundOffering({ provider: PactWallet.provider, offeringAddress: r.offeringAddress, from: connectedWallet });
      onchainOfferingState = null;
      render();
      refreshOnchainOffering();
    } catch (err) {
      notice('Refund failed', esc(err.message || 'Could not complete refund.'));
      refundBtn.disabled = false;
    }
    return;
  }

  if (!e.target.closest('[data-act="pay"]')) return;
  if (!connectedWallet) {
    notice('Wallet required', 'Connect a wallet before purchasing this offering.');
    return;
  }
  const r = currentRaise;
  const a = r && (r.allocations || []).find(x => x.id === allocId);
  if (!a) return;
  const btn = e.target.closest('[data-act="pay"]');
  btn.disabled = true;
  btn.textContent = r.offeringAddress ? 'Purchasing...' : 'Marking purchased...';
  try {
    let txHash = null;
    let purchaseRecord = null;
    if (r.offeringAddress) {
      if (!window.PactLiquidSplit) throw new Error('Onchain module is unavailable.');
      const purchase = await PactLiquidSplit.buyOffering({
        provider: PactWallet.provider,
        issuance: r,
        buyer: connectedWallet,
        amountUsd: a.amountUsd,
      });
      txHash = purchase.buyTxHash;
      purchaseRecord = {
        txHash,
        tokensPurchased: purchase.units,
        purchaseCostUsdcBaseUnits: purchase.cost,
      };
    }
    const result = await PactAPI.fundAllocation(r.id, a.id, connectedWallet, purchaseRecord || txHash);
    currentRaise = result.raise;
    onchainReceiptState = null;
    onchainOfferingState = null;
    render();
    refreshOnchainOffering();
    refreshOnchainReceipt();
  } catch (err) {
    notice('Purchase failed', esc(err.message || 'Could not complete purchase.'));
    btn.disabled = false;
  }
});

PactSettings.init({ buttonId: 'settingsToggle', onChange: render });
PactWallet.init({
  buttonId: 'walletToggle',
  onChange: account => {
    connectedWallet = account;
    onchainOfferingState = null;
    render();
    refreshOnchainOffering();
    refreshOnchainReceipt();
  },
  onError: err => notice('Wallet unavailable', esc(err.message || 'Could not connect wallet.')),
});
loadRaise();

function initDebugMenu() {
  if (!['localhost', '127.0.0.1'].includes(location.hostname)) return;
  const menu = $('debugMenu');
  const toggle = $('debugToggle');
  const panel = $('debugPanel');
  if (!menu || !toggle || !panel) return;
  menu.classList.add('show');
  function syncDebugMenu() {
    panel.querySelectorAll('[data-debug-state]').forEach(button => {
      button.classList.toggle('active', button.dataset.debugState === debugOfferingState);
    });
  }
  toggle.addEventListener('click', () => {
    syncDebugMenu();
    panel.classList.toggle('show');
  });
  panel.addEventListener('click', e => {
    const button = e.target.closest('[data-debug-state]');
    if (!button) return;
    debugOfferingState = button.dataset.debugState;
    syncDebugMenu();
    panel.classList.remove('show');
    render();
  });
  document.addEventListener('click', e => {
    if (menu.contains(e.target)) return;
    panel.classList.remove('show');
  });
  syncDebugMenu();
}
initDebugMenu();
</script>
<script>
  if (['localhost', '127.0.0.1'].includes(location.hostname)) {
    const watch = [location.href, 'app.css', 'api.js', 'wallet.js', 'settings.js', 'dist/onchain.bundle.js'];
    let stamp = null;
    setInterval(async () => {
      try {
        const tags = await Promise.all(watch.map(u => fetch(u, { method: 'HEAD', cache: 'no-store' }).then(r => r.headers.get('last-modified') || r.headers.get('etag') || '')));
        const t = tags.join('|');
        if (stamp && t !== stamp) location.reload();
        stamp = t;
      } catch (e) {}
    }, 1000);
  }
</script>
</body>
