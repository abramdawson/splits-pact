<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACT</title>
<script>
  // Apply the saved style preset before first paint to avoid a theme flash.
  try {
    var s = localStorage.getItem('pact-style');
    if (s && s !== 'clarity') document.documentElement.setAttribute('data-style', s);
    if (s === 'cipher') document.documentElement.classList.add('dark');
  } catch (e) {}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="/src/app.css">
</head>
<body>

    <main id="app" class="w-full max-w-2xl text-base leading-[1.65]"></main>
  </div>

<script type="module" src="/src/pages/home.jsx"></script>
</body>
</html>
