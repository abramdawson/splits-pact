<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raise Status</title>
<script>
  (function () {
    try {
      var s = localStorage.getItem('bc-theme');
      var d = s ? s === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
      if (d) document.documentElement.classList.add('dark');
      var f = localStorage.getItem('bc-font');
      if (f && f !== 'mono') document.documentElement.setAttribute('data-font', f);
    } catch (e) {}
  })();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class', theme: { extend: { fontWeight: { bold: '600' }, colors: { ok: 'var(--ok)', pending: 'var(--pending)', danger: 'var(--danger)' } } } };</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<style>
  .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(8px); background: var(--ink); color: var(--paper); font-size: 13px; padding: 8px 14px; opacity: 0; pointer-events: none; transition: opacity 150ms ease, transform 150ms ease; z-index: 20; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .act { background: none; border: 0; cursor: pointer; font-family: inherit; font-size: 12px; color: var(--marker); padding: 0; }
  .act:hover { text-decoration: underline; }
  .act.danger { color: var(--del); }
  .act.danger:hover { color: var(--danger); }
  .alloc-form { border: 1px dotted var(--line-dotted); padding: 16px; margin: 48px 0 18px; }
  .alloc-form .blank { height: 34px; }
  .alloc-form .cta { height: 34px; display: inline-flex; align-items: center; }
  .alloc-table { table-layout: fixed; }
  .alloc-table td:nth-child(1) { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .alloc-table th:nth-child(2), .alloc-table td:nth-child(2) { width: 100px; }
  .alloc-table th:nth-child(3), .alloc-table td:nth-child(3) { width: 300px; }
  .alloc-table th:nth-child(4), .alloc-table td:nth-child(4) { width: 140px; }
  .tokencell { position: relative; text-decoration: underline dotted; text-decoration-color: var(--muted); text-underline-offset: 3px; }
  .tokencell .tip2 { position: absolute; bottom: calc(100% + 8px); right: 0; white-space: nowrap; background: var(--ink); color: var(--paper); font-size: 11px; line-height: 1.4; padding: 4px 9px; opacity: 0; pointer-events: none; transition: opacity 120ms ease; z-index: 5; text-decoration: none; }
  .tokencell .tip2::after { content: ''; position: absolute; top: 100%; right: 12px; border: 4px solid transparent; border-top-color: var(--ink); }
  .tokencell:hover .tip2 { opacity: 1; }
</style>
</head>
<body>
  <div class="top-controls">
    <button id="walletToggle" class="wallet-toggle" type="button">Connect wallet</button>
    <button id="fontToggle" class="font-toggle" aria-label="Toggle font">Aa</button>
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle light / dark">
      <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
  </div>

  <div class="min-h-screen flex justify-center items-start py-12 px-4">
    <div class="paper w-full max-w-[820px] px-10 py-12 sm:px-16 sm:py-16 text-[14px] leading-[1.5]">
      <div id="app"></div>
    </div>
  </div>
  <div id="toast" class="toast"></div>

<script src="api.js"></script>
<script src="wallet.js"></script>
<script>
const $ = id => document.getElementById(id);
const app = $('app');

const fmtMoney = n => '$' + Math.round(n).toLocaleString('en-US');
const fmtTokens = n => Math.round(n).toLocaleString('en-US');
const fmtDate = ts => new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
const fmtMonthYear = ts => new Date(ts).toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
const fmtPrice = p => '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtShort = ts => { const d = new Date(ts); return d.getDate() + '-' + d.toLocaleDateString('en-US', { month: 'short' }); };
const shortAddr = a => a && a.length > 12 ? a.slice(0, 6) + '…' + a.slice(-4) : (a || '');
const esc = s => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const relDays = ts => { const d = Math.ceil((ts - Date.now()) / 86400000); return d > 1 ? 'in ' + d + ' days' : d === 1 ? 'in 1 day' : d === 0 ? 'today' : d === -1 ? '1 day ago' : Math.abs(d) + ' days ago'; };

const raiseId = new URLSearchParams(location.search).get('id');
let currentRaise = null;

function getRaise() { return currentRaise; }
async function loadRaise() {
  if (!raiseId) {
    currentRaise = null;
    render();
    return;
  }
  try {
    currentRaise = await PactAPI.getRaise(raiseId);
  } catch (err) {
    currentRaise = null;
  }
  render();
}

// fraction of the project sold once a cumulative $R has been raised along the curve
function fractionAt(r, R) {
  const cap = r.valuation.effectiveCap, vMin = r.valuation.floor, vMax = r.valuation.ceiling;
  const F = r.maxDilutionPct / 100, rmax = r.raise.max;
  if (R <= 0) return 0;
  if (R >= rmax) return F;
  if (vMax === vMin) return Math.min(R / cap, F);
  const a = (vMax - vMin) / (2 * F);
  return Math.min((-vMin + Math.sqrt(vMin * vMin + 4 * a * R)) / (2 * a), F);
}
const tokensBetween = (r, R0, R1) => (fractionAt(r, R1) - fractionAt(r, R0)) * r.totalTokens;

// tokens are only known once funded — price isn't fixed until a purchase executes,
// since anyone funding ahead changes where these dollars land on the curve
function tokenMath(r) {
  const funded = r.allocations.filter(a => a.status === 'funded').sort((a, b) => (a.fundedAt || 0) - (b.fundedAt || 0));
  const tokensById = {};
  let cum = 0;
  funded.forEach(a => {
    tokensById[a.id] = tokensBetween(r, cum, cum + a.amountUsd);
    cum += a.amountUsd;
  });
  const allocatedTotal = r.allocations.filter(a => a.status === 'allocated').reduce((s, a) => s + a.amountUsd, 0);
  return { tokensById, fundedTotal: cum, allocatedTotal };
}

function buyLink(allocId) {
  return new URL('buy.html?r=' + raiseId + '&a=' + allocId, location.href).href;
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1600);
}

function copy(text, msg) {
  navigator.clipboard.writeText(text).then(() => toast(msg || 'Copied')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast(msg || 'Copied'); } catch (e) {}
    ta.remove();
  });
}

function render() {
  const r = getRaise();
  if (!r) {
    app.innerHTML = `<h1 class="text-lg font-bold">Raise not found</h1>
      <p class="t-muted mt-3">No issuance matches this link. <a href="index.html" class="linkbtn">Create one</a>.</p>`;
    return;
  }

  const m = tokenMath(r);
  const max = r.raise.max, min = r.raise.min;
  const offerTokens = r.maxDilutionPct / 100 * r.totalTokens;
  const purchased = tokensBetween(r, 0, m.fundedTotal);
  const F = r.maxDilutionPct / 100;
  const valNow = r.valuation.floor + (r.valuation.ceiling - r.valuation.floor) * (F > 0 ? fractionAt(r, m.fundedTotal) / F : 0);

  const closeDate = r.createdAt + r.minimum.deadlineDays * 86400000;
  const filled = m.fundedTotal >= max;
  const pastClose = Date.now() > closeDate;
  const open = !filled && !pastClose;
  const gap = min - m.fundedTotal;
  const secured = gap <= 0;
  const statusWord = open ? 'Open' : 'Closed';
  const noteText = secured ? 'secured' : (open ? fmtMoney(gap) + ' below threshold' : 'below threshold — refund');
  const noteColor = secured ? 'var(--ok)' : (open ? 'var(--pending)' : 'var(--danger)');

  const ordered = [
    ...r.allocations.filter(a => a.status === 'funded').sort((a, b) => (a.fundedAt || 0) - (b.fundedAt || 0)),
    ...r.allocations.filter(a => a.status === 'allocated').sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)),
  ];
  let cum = 0;
  const segs = [];
  ordered.forEach(a => {
    const left = cum / max * 100;
    if (left < 100) segs.push({ a, left, width: Math.min(a.amountUsd / max * 100, 100 - left), funded: a.status === 'funded' });
    cum += a.amountUsd;
  });
  const minPct = Math.min(100, min / max * 100);
  const over = m.fundedTotal + m.allocatedTotal - max; // committed beyond the max

  const rows = r.allocations.slice().sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)).map(a => {
    const funded = a.status === 'funded';
    const tk = m.tokensById[a.id] || 0;
    const status = funded
      ? `<span class="badge funded"><span class="tokencell">${fmtTokens(tk)} tokens<span class="tip2">${tk > 0 ? fmtPrice(a.amountUsd / tk) : '—'} / token</span></span> purchased for ${fmtMoney(a.amountUsd)}</span>`
      : `<span class="badge allocated">Allocated</span> <span class="t-muted">${fmtShort(a.createdAt)}</span>`;
    return `<tr>
      <td>${esc(a.name)}</td>
      <td class="num">${fmtMoney(a.amountUsd)}</td>
      <td>${status}</td>
      <td class="num whitespace-nowrap">
        ${funded ? '' : `<button class="act" data-act="copy" data-id="${a.id}">Copy link</button>`}
        <button class="act danger" data-act="del" data-id="${a.id}">Delete</button>
      </td>
    </tr>`;
  }).join('');

  app.innerHTML = `
    <div class="mb-2 flex items-start justify-between gap-4">
      <div>
        <h1 class="text-lg font-bold">${esc(r.projectName)}</h1>
        <p class="text-[13px] t-muted mt-1">PACT &middot; ${fmtMonthYear(r.createdAt)} offering</p>
      </div>
      <a href="index.html" class="linkbtn text-[13px] no-print">+ New issuance</a>
    </div>

    <div class="font-bold mb-2 mt-8">Offering details</div>
    <dl class="deflist mb-7">
      <dt>Raising</dt><dd>${min !== max ? 'Up to ' : ''}${fmtMoney(max)} on ${fmtMoney(r.valuation.effectiveCap)} post-money</dd>
      <dt>Selling</dt><dd class="flex items-baseline space-x-2"><span>${r.maxDilutionPct}%</span><span class="t-muted">${fmtTokens(offerTokens)} tokens</span></dd>
      <dt>Close date</dt><dd class="flex items-baseline space-x-2"><span>${fmtDate(closeDate)}</span><span class="t-muted">${relDays(closeDate)}</span></dd>
    </dl>

    <div class="font-bold mb-2">Offering status</div>
    <dl class="deflist">
      <dt>Status</dt><dd class="flex items-baseline space-x-2"><span>${statusWord}</span><span class="t-muted">${noteText}</span></dd>
      <dt>Tokens sold</dt><dd>${fmtTokens(purchased)} of ${fmtTokens(offerTokens)}</dd>
      <dt>Current valuation</dt><dd>${fmtMoney(valNow)} post-money</dd>
    </dl>

    <div class="mt-8">
      <div class="track-wrap">
        ${segs.map(s => `<div class="seg ${s.funded ? 'funded' : 'allocated'}" style="left:${s.left}%;width:${s.width}%"><span class="tip">${esc(s.a.name)}: ${fmtMoney(s.a.amountUsd)}</span></div>`).join('')}
        <div class="minmark" style="left:${minPct}%"><div class="tip">Threshold: ${fmtMoney(min)}${secured ? '' : ` <span class="ml-2">${fmtMoney(gap)} below</span>`}</div></div>
      </div>
      <div class="flex justify-between items-baseline mt-2 text-[12px]">
        <div class="flex items-baseline gap-3">
          <span><span class="font-bold">${fmtMoney(m.fundedTotal)}</span> raised</span>
          ${m.allocatedTotal > 0 ? `<span class="t-muted">${fmtMoney(m.allocatedTotal)} allocated</span>` : ''}
          ${over > 0 ? `<span class="text-pending">${fmtMoney(over)} oversubscribed</span>` : ''}
        </div>
        <span class="t-muted">${fmtMoney(max)}</span>
      </div>
    </div>

    <div class="alloc-form no-print">
      <div class="font-bold mb-3">New allocation</div>
      <div class="flex items-center gap-3">
        <input id="allocName" class="blank flex-1" placeholder="Buyer name" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div class="flex items-center gap-1"><span class="t-muted">$</span><input id="allocAmount" class="blank w-28 text-left" inputmode="numeric" placeholder="0" autocomplete="off"></div>
        <button class="cta px-5 text-[13px] font-semibold" data-act="add">Generate link</button>
      </div>
      <p id="allocError" class="hidden text-[13px] t-danger mt-2"></p>
    </div>

    <table class="exhibit alloc-table mt-10">
      <thead><tr><th>Buyer</th><th class="num">Amount</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows || `<tr><td colspan="4" class="px-2 py-5"><div class="max-w-[480px] mx-auto text-center leading-relaxed"><div class="font-bold mb-1.5">No allocations yet</div><div class="t-muted">This offering is private &mdash; not a general solicitation. Use the form above to create an allocation for each individual buyer, then share their unique link. Only someone holding their link can buy in.</div></div></td></tr>`}</tbody>
    </table>`;
}

// delegated events (set once; survive re-renders)
function updateAddBtn() {
  // Allocation validity is checked when the user clicks Generate link.
}

app.addEventListener('input', e => {
  if (e.target.id === 'allocAmount') {
    const d = e.target.value.replace(/[^0-9]/g, '');
    e.target.value = d ? Number(d).toLocaleString('en-US') : '';
  }
  if (e.target.id === 'allocAmount' || e.target.id === 'allocName') updateAddBtn();
});

app.addEventListener('click', async e => {
  const btn = e.target.closest('[data-act]');
  if (!btn) return;
  const act = btn.dataset.act, id = btn.dataset.id;
  const r = getRaise();
  if (!r) return;

  if (act === 'add') {
    const name = $('allocName').value.trim();
    const amount = +$('allocAmount').value.replace(/[^0-9.]/g, '') || 0;
    const err = $('allocError');
    if (!name || !(amount > 0)) {
      err.textContent = !name ? 'Enter a buyer name.' : 'Enter an amount greater than 0.';
      err.classList.remove('hidden');
      return;
    }
    btn.disabled = true;
    try {
      const result = await PactAPI.addAllocation(r.id, { name, amountUsd: amount });
      currentRaise = result.raise;
      render();
      copy(buyLink(result.allocation.id), 'Link copied — send it to ' + name);
    } catch (err2) {
      err.textContent = err2.message || 'Could not create allocation.';
      err.classList.remove('hidden');
      btn.disabled = false;
    }
    return;
  }
  if (act === 'copy') { copy(buyLink(id)); return; }
  if (act === 'del') {
    const a = r.allocations.find(x => x.id === id);
    if (a && confirm('Delete the allocation for ' + a.name + '?')) {
      try {
        const result = await PactAPI.deleteAllocation(r.id, id);
        currentRaise = result.raise;
        render();
      } catch (err) {
        toast(err.message || 'Could not delete allocation');
      }
    }
    return;
  }
});

$('themeToggle').addEventListener('click', () => {
  const dark = document.documentElement.classList.toggle('dark');
  try { localStorage.setItem('bc-theme', dark ? 'dark' : 'light'); } catch (e) {}
  render(); // repaint the chart in the new palette
});

const FONTS = ['mono', 'serif', 'sans'];
const FONT_NAMES = { mono: 'Mono', serif: 'Serif', sans: 'Sans' };
function applyFontTitle() {
  $('fontToggle').title = 'Font: ' + FONT_NAMES[document.documentElement.getAttribute('data-font') || 'mono'];
}
applyFontTitle();
$('fontToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-font') || 'mono';
  const next = FONTS[(FONTS.indexOf(cur) + 1) % FONTS.length];
  if (next === 'mono') document.documentElement.removeAttribute('data-font');
  else document.documentElement.setAttribute('data-font', next);
  try { localStorage.setItem('bc-font', next); } catch (e) {}
  applyFontTitle();
  render(); // repaint the chart in the new font
});

PactWallet.init({ buttonId: 'walletToggle' });
loadRaise();
</script>
<script>
  if (['localhost', '127.0.0.1'].includes(location.hostname)) {
    const watch = [location.href, 'app.css'];
    let stamp = null;
    setInterval(async () => {
      try {
        const tags = await Promise.all(watch.map(u => fetch(u, { method: 'HEAD', cache: 'no-store' }).then(r => r.headers.get('last-modified') || r.headers.get('etag') || '')));
        const t = tags.join('|');
        if (stamp && t !== stamp) location.reload();
        stamp = t;
      } catch (e) {}
    }, 1000);
  }
</script>
</body>
</html>
