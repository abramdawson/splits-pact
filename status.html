  .tokencell .tip2::after { content: ''; position: absolute; top: 100%; right: 12px; border: 4px solid transparent; border-top-color: var(--ink); }
  .tokencell:hover .tip2 { opacity: 1; }

  <div class="top-controls">

    </button>

<script src="api.js"></script>

<script>
const $ = id => document.getElementById(id);
const app = $('app');

function fmtMoney(n) {
  const value = Number(n) || 0;
  const hasCents = Math.abs(value - Math.round(value)) > 0.000001 || (value > 0 && value < 1);
  return '$' + value.toLocaleString('en-US', {
    minimumFractionDigits: hasCents ? 2 : 0,
    maximumFractionDigits: 2,
  });
}
const fmtTokens = n => Math.round(n).toLocaleString('en-US');
const fmtPct = n => Number(n || 0).toFixed(1) + '%';
const fmtDate = ts => new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
const fmtMonthYear = ts => new Date(ts).toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
const fmtPrice = p => '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtShort = ts => { const d = new Date(ts); return d.getDate() + '-' + d.toLocaleDateString('en-US', { month: 'short' }); };
const shortAddr = a => a && a.length > 12 ? a.slice(0, 6) + '…' + a.slice(-4) : (a || '');
const esc = s => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const relDays = ts => { const d = Math.ceil((ts - Date.now()) / 86400000); return d > 1 ? 'in ' + d + ' days' : d === 1 ? 'in 1 day' : d === 0 ? 'today' : d === -1 ? '1 day ago' : Math.abs(d) + ' days ago'; };
const basescanAddress = address => 'https://basescan.org/address/' + encodeURIComponent(address);
const splitsExplorerAccount = address => 'https://explorer.splits.org/accounts/' + encodeURIComponent(address) + '/?chainId=8453';

const raiseId = new URLSearchParams(location.search).get('id');
let currentRaise = null;
let onchainCapTableState = null;
let connectedWallet = null;

function getRaise() { return currentRaise; }
function accessWallets(r) {
  return [
    r && r.issuerWallet,
    r && r.proceedsAddress,
    ...((r && Array.isArray(r.collaborators)) ? r.collaborators : []),
  ].filter(Boolean).map(wallet => String(wallet).toLowerCase());
}
function canManageRaise(r) {
  return !!connectedWallet && accessWallets(r).includes(String(connectedWallet).toLowerCase());
}
async function loadRaise() {
  if (!raiseId) {
    currentRaise = null;
    render();
    return;
  }
  try {
    currentRaise = await PactAPI.getRaise(raiseId);
  } catch (err) {
    currentRaise = null;
  }
  onchainCapTableState = null;
  render();
  refreshOnchainCapTable();
}

// fraction of the project sold once a cumulative $R has been raised along the curve
function fractionAt(r, R) {
  const cap = r.valuation.effectiveCap, vMin = r.valuation.floor, vMax = r.valuation.ceiling;
  const F = r.maxDilutionPct / 100, rmax = r.raise.max;
  if (R <= 0) return 0;
  if (R >= rmax) return F;
  if (vMax === vMin) return Math.min(R / cap, F);
  const a = (vMax - vMin) / (2 * F);
  return Math.min((-vMin + Math.sqrt(vMin * vMin + 4 * a * R)) / (2 * a), F);
}
const tokensBetween = (r, R0, R1) => (fractionAt(r, R1) - fractionAt(r, R0)) * r.totalTokens;

// tokens are only known once funded — price isn't fixed until a purchase executes,
// since anyone funding ahead changes where these dollars land on the curve
function tokenMath(r) {
  const funded = r.allocations.filter(a => a.status === 'funded').sort((a, b) => (a.fundedAt || 0) - (b.fundedAt || 0));
  const tokensById = {};
  let cum = 0;
  funded.forEach(a => {
    tokensById[a.id] = tokensBetween(r, cum, cum + a.amountUsd);
    cum += a.amountUsd;
  });
  const allocatedTotal = r.allocations.filter(a => a.status === 'allocated').reduce((s, a) => s + a.amountUsd, 0);
  return { tokensById, fundedTotal: cum, allocatedTotal };
}

async function refreshOnchainCapTable() {
  const r = getRaise();
  if (!r || !r.liquidSplitAddress || !r.bondingCurveAddress || !window.PactAPI) return;
  const key = r.id + ':' + r.liquidSplitAddress + ':' + r.bondingCurveAddress;
  onchainCapTableState = { key, status: 'loading' };
  render();
  try {
    const result = await PactAPI.getLiquidSplitHolders(r.liquidSplitAddress, r.chainId || 8453);
    const holders = result.holders || [];
    const curve = holders.find(holder => String(holder.address || '').toLowerCase() === String(r.bondingCurveAddress || '').toLowerCase());
    onchainCapTableState = { key, status: 'loaded', source: result.source || 'splits-explorer', curveBalance: curve ? Number(curve.balance) : 0, holders };
  } catch (explorerErr) {
    try {
      onchainCapTableState = await readOnchainCapTableFromRpc(r, key);
    } catch (rpcErr) {
      onchainCapTableState = {
        key,
        status: 'error',
        error: rpcErr.message || explorerErr.message || 'Could not read onchain cap table.',
      };
    }
  }
  render();
}

async function readOnchainCapTableFromRpc(r, key) {
  if (!window.PactLiquidSplit) throw new Error('Onchain bundle is unavailable.');
    const [curveBalance, holders] = await Promise.all([
      PactLiquidSplit.getLiquidSplitTokenBalance({
        liquidSplitAddress: r.liquidSplitAddress,
        account: r.bondingCurveAddress,
      }),
      PactLiquidSplit.getLiquidSplitHolders({
        liquidSplitAddress: r.liquidSplitAddress,
        deploymentTxHash: r.liquidSplitTxHash,
      }),
    ]);
  return { key, status: 'loaded', curveBalance: Number(curveBalance), holders, source: 'rpc' };
}

function buyLink(allocId) {
  return new URL('buy.html?r=' + raiseId + '&a=' + allocId, location.href).href;
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1600);
}

function copy(text, msg) {
  navigator.clipboard.writeText(text).then(() => toast(msg || 'Copied')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast(msg || 'Copied'); } catch (e) {}
    ta.remove();
  });
}

function capTableHoldersFor(r, key) {
  const bondingCurveAddress = String(r.bondingCurveAddress || '').toLowerCase();
  const state = onchainCapTableState && onchainCapTableState.key === key ? onchainCapTableState : null;
  const holders = state && state.status === 'loaded'
    ? state.holders
    : [
        ...(r.holders || []).map(h => ({ address: h.address, balance: h.tokens })),
        ...(r.bondingCurveAddress && r.newMoney ? [{ address: r.bondingCurveAddress, balance: r.newMoney.tokens }] : []),
      ];
  return holders.slice().sort((a, b) => {
    const ac = String(a.address || '').toLowerCase() === bondingCurveAddress ? 1 : 0;
    const bc = String(b.address || '').toLowerCase() === bondingCurveAddress ? 1 : 0;
    if (ac !== bc) return ac - bc;
    return String(a.address || '').toLowerCase() > String(b.address || '').toLowerCase() ? 1 : -1;
  });
}

function capTableRowsFor(r, key, holders) {
  const bondingCurveAddress = String(r.bondingCurveAddress || '').toLowerCase();
  const state = onchainCapTableState && onchainCapTableState.key === key ? onchainCapTableState : null;
  if (state && state.status === 'loading') {
    return '<tr><td colspan="3" class="px-2 py-5 text-center t-muted">Loading current Liquid Split holders...</td></tr>';
  }

  if (!holders.length) {
    return '<tr><td colspan="3" class="px-2 py-5 text-center t-muted">No cap table entries yet.</td></tr>';
  }

  return holders
    .map(holder => {
      const address = holder.address;
      const lower = String(address || '').toLowerCase();
      const isCurve = lower === bondingCurveAddress;
      const label = isCurve
        ? `Bonding curve: <a class="linkbtn" href="${basescanAddress(address)}" target="_blank" rel="noreferrer">${shortAddr(address)}</a>`
        : `<a class="linkbtn" href="${basescanAddress(address)}" target="_blank" rel="noreferrer">${shortAddr(address)}</a>`;
      return `<tr${isCurve ? ' class="highlight"' : ''}>
        <td>${label}</td>
        <td class="num">${fmtTokens(holder.balance)}</td>
        <td class="num">${fmtPct(holder.balance / r.totalTokens * 100)}</td>
      </tr>`;
    })
    .join('');
}

function capTableFooterFor(r, key, holders) {
  const state = onchainCapTableState && onchainCapTableState.key === key ? onchainCapTableState : null;
  const loading = state && state.status === 'loading';
  const totalTokens = holders.reduce((sum, holder) => sum + Number(holder.balance || 0), 0);
  const liquidSplitLink = r.liquidSplitAddress
    ? `<a class="linkbtn" href="${splitsExplorerAccount(r.liquidSplitAddress)}" target="_blank" rel="noreferrer">${shortAddr(r.liquidSplitAddress)}</a>`
    : '<span class="t-muted">Not deployed</span>';
  return `<tfoot>
    <tr>
      <td>Total</td>
      <td class="num">${loading ? '...' : fmtTokens(totalTokens)}</td>
      <td class="num">${loading ? '...' : fmtPct(totalTokens / r.totalTokens * 100)}</td>
    </tr>
    <tr class="footnote">
      <td colspan="3">Verify this cap table by viewing the Liquid Split at ${liquidSplitLink}.</td>
    </tr>
  </tfoot>`;
}

function render() {
  const r = getRaise();
  if (!r) {
    app.innerHTML = `<h1 class="text-lg font-bold">Raise not found</h1>
      <p class="t-muted mt-3">No issuance matches this link. <a href="index.html" class="linkbtn">Create one</a>.</p>`;
    return;
  }

  const m = tokenMath(r);
  const canManage = canManageRaise(r);
  const max = r.raise.max, min = r.raise.min;
  const offerTokens = r.maxDilutionPct / 100 * r.totalTokens;
  const purchased = tokensBetween(r, 0, m.fundedTotal);
  const F = r.maxDilutionPct / 100;
  const currentFraction = fractionAt(r, m.fundedTotal);
  const valNow = r.valuation.floor + (r.valuation.ceiling - r.valuation.floor) * (F > 0 ? currentFraction / F : 0);

  const closeDate = r.createdAt + r.minimum.deadlineDays * 86400000;
  const filled = m.fundedTotal >= max;
  const pastClose = Date.now() > closeDate;
  const open = !filled && !pastClose;
  const gap = min - m.fundedTotal;
  const secured = gap <= 0;
  const statusWord = open ? 'Open' : 'Closed';
  const noteText = secured ? 'secured' : (open ? fmtMoney(gap) + ' below threshold' : 'below threshold — refund');

  const ordered = [
    ...r.allocations.filter(a => a.status === 'funded').sort((a, b) => (a.fundedAt || 0) - (b.fundedAt || 0)),
    ...r.allocations.filter(a => a.status === 'allocated').sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)),
  ];
  let cum = 0;
  const segs = [];
  ordered.forEach(a => {
    const left = cum / max * 100;
    if (left < 100) segs.push({ label: a.name, amountUsd: a.amountUsd, left, width: Math.min(a.amountUsd / max * 100, 100 - left), funded: a.status === 'funded' });
    cum += a.amountUsd;
  });
  const minPct = Math.min(100, min / max * 100);
  const over = m.fundedTotal + m.allocatedTotal - max; // committed beyond the max

  const rows = r.allocations.slice().sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)).map(a => {
    const funded = a.status === 'funded';
    const tk = m.tokensById[a.id] || 0;
    const status = funded
      ? `<span class="badge funded"><span class="tokencell">${fmtTokens(tk)} tokens<span class="tip2">${tk > 0 ? fmtPrice(a.amountUsd / tk) : '—'} / token</span></span> purchased for ${fmtMoney(a.amountUsd)}</span>`
      : `<span class="badge allocated">Allocated</span> <span class="t-muted">${fmtShort(a.createdAt)}</span>`;
    return `<tr>
      <td>${esc(a.name)}</td>
      <td class="num">${fmtMoney(a.amountUsd)}</td>
      <td>${status}</td>
      <td class="num whitespace-nowrap">
        ${canManage ? `<button class="act" data-act="copy" data-id="${a.id}">Copy link</button> ${funded ? '' : `<button class="act danger" data-act="del" data-id="${a.id}">Delete</button>`}` : ''}
      </td>
    </tr>`;
  }).join('');
  const bondingCurveAddress = r.bondingCurveAddress || '';
  const capTableKey = r.id + ':' + r.liquidSplitAddress + ':' + r.bondingCurveAddress;
  const capTableHolders = capTableHoldersFor(r, capTableKey);
  const capTableRows = capTableRowsFor(r, capTableKey, capTableHolders);
  const capTableFooter = capTableFooterFor(r, capTableKey, capTableHolders);
  const capTableState = onchainCapTableState && onchainCapTableState.key === capTableKey ? onchainCapTableState : null;
  const capTableNote = !r.liquidSplitAddress
    ? 'Onchain cap table appears after Liquid Split deployment.'
    : capTableState && capTableState.status === 'loading'
      ? 'Reading indexed holder balances from Splits Explorer.'
      : capTableState && capTableState.status === 'loaded' && capTableState.source === 'rpc'
        ? 'Splits Explorer was unavailable. Showing current balances from direct Base RPC.'
        : capTableState && capTableState.status === 'error'
          ? 'Could not read indexed or direct onchain balances. Showing issuance targets.'
        : '';

  app.innerHTML = `
    <div class="mb-2 flex items-start justify-between gap-4">
      <div>
        <h1 class="text-lg font-bold">${esc(r.projectName)}</h1>
        <p class="text-[13px] t-muted mt-1">PACT &middot; ${fmtMonthYear(r.createdAt)} offering</p>
      </div>
    </div>

    <div class="font-bold mb-2 mt-8">Offering details</div>
    <dl class="deflist mb-7">
      <dt>Raising</dt><dd>${min !== max ? 'Up to ' : ''}${fmtMoney(max)} on ${fmtMoney(r.valuation.effectiveCap)} post-money</dd>
      <dt>Selling</dt><dd class="flex items-baseline space-x-2"><span>${r.maxDilutionPct}%</span><span class="t-muted">${fmtTokens(offerTokens)} tokens</span></dd>
      <dt>Close date</dt><dd class="flex items-baseline space-x-2"><span>${fmtDate(closeDate)}</span><span class="t-muted">${relDays(closeDate)}</span></dd>
    </dl>

    <div class="font-bold mb-2">Offering status</div>
    <dl class="deflist">
      <dt>Status</dt><dd class="flex items-baseline space-x-2"><span>${statusWord}</span><span class="t-muted">${noteText}</span></dd>
      <dt>Tokens sold</dt><dd>${fmtTokens(purchased)} of ${fmtTokens(offerTokens)}</dd>
      <dt>Current valuation</dt><dd class="flex items-baseline space-x-2"><span>${fmtMoney(valNow)} post-money</span><span class="t-muted">${fmtPrice(valNow / r.totalTokens)} / share</span></dd>
    </dl>

    <div class="mt-8">
      <div class="track-wrap">
        ${segs.map(s => `<div class="seg ${s.funded ? 'funded' : 'allocated'}" style="left:${s.left}%;width:${s.width}%"><span class="tip">${esc(s.label)}: ${fmtMoney(s.amountUsd)}</span></div>`).join('')}
        <div class="minmark" style="left:${minPct}%"><div class="tip">Threshold: ${fmtMoney(min)}${secured ? '' : ` <span class="ml-2">${fmtMoney(gap)} below</span>`}</div></div>
      </div>
      <div class="flex justify-between items-baseline mt-2 text-[12px]">
        <div class="flex items-baseline gap-3">
          <span><span class="font-bold">${fmtMoney(m.fundedTotal)}</span> raised</span>
          ${m.allocatedTotal > 0 ? `<span class="t-muted">${fmtMoney(m.allocatedTotal)} allocated</span>` : ''}
          ${over > 0 ? `<span class="text-pending">${fmtMoney(over)} oversubscribed</span>` : ''}
        </div>
        <span class="t-muted">${fmtMoney(max)}</span>
      </div>
    </div>

    ${canManage ? `<div class="alloc-form no-print">
      <div class="font-bold mb-3">New allocation</div>
      <div class="flex items-center gap-3">
        <input id="allocName" class="blank flex-1" placeholder="Buyer name" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div class="flex items-center gap-1"><span class="t-muted">$</span><input id="allocAmount" class="blank w-28 text-left" inputmode="decimal" placeholder="0.00" autocomplete="off"></div>
        <button class="cta px-5 text-[13px] font-semibold" data-act="add">Generate link</button>
      </div>
      <p id="allocError" class="hidden text-[13px] t-danger mt-2"></p>
    </div>` : `<div class="notice no-print mt-10 mb-4">Connect with the issuer, treasury, or a collaborator wallet to manage allocations.</div>`}

    ${canManage ? `<table class="exhibit alloc-table mt-10">
      <thead><tr><th>Buyer</th><th class="num">Amount</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows || `<tr><td colspan="4" class="px-2 py-5 text-center t-muted">No allocations yet. Create a private allocation using the above form.</td></tr>`}</tbody>
    </table>` : ''}

    <div class="font-bold mb-2 mt-10">Cap table</div>
    ${capTableNote ? `<p class="text-[12px] t-muted mb-2">${capTableNote}</p>` : ''}
    <table class="exhibit mb-10">
      <thead><tr><th>Holder</th><th class="num">Tokens</th><th class="num">Ownership</th></tr></thead>
      <tbody>${capTableRows}</tbody>
      ${capTableFooter}
    </table>`;
}

// delegated events (set once; survive re-renders)
function updateAddBtn() {
  // Allocation validity is checked when the user clicks Generate link.
}

app.addEventListener('input', e => {
  if (e.target.id === 'allocAmount') {
    const raw = e.target.value.replace(/,/g, '').replace(/[^0-9.]/g, '');
    const parts = raw.split('.');
    const intPart = parts[0].replace(/^0+(?=\d)/, '');
    const decPart = parts.length > 1 ? parts.slice(1).join('').slice(0, 2) : null;
    const intDisplay = intPart ? Number(intPart).toLocaleString('en-US') : '';
    e.target.value = decPart == null ? intDisplay : (intDisplay || '0') + '.' + decPart;
  }
  if (e.target.id === 'allocAmount' || e.target.id === 'allocName') updateAddBtn();
});

app.addEventListener('click', async e => {
  const btn = e.target.closest('[data-act]');
  if (!btn) return;
  const act = btn.dataset.act, id = btn.dataset.id;
  const r = getRaise();
  if (!r) return;
  if (!canManageRaise(r)) {
    toast('Connect an authorized wallet to manage this issuance');
    return;
  }

  if (act === 'add') {
    const name = $('allocName').value.trim();
    const amount = +$('allocAmount').value.replace(/[^0-9.]/g, '') || 0;
    const err = $('allocError');
    if (!name || !(amount > 0)) {
      err.textContent = !name ? 'Enter a buyer name.' : 'Enter an amount greater than 0.';
      err.classList.remove('hidden');
      return;
    }
    btn.disabled = true;
    try {
      const result = await PactAPI.addAllocation(r.id, { name, amountUsd: amount });
      currentRaise = result.raise;
      render();
      copy(buyLink(result.allocation.id), 'Link copied — send it to ' + name);
    } catch (err2) {
      err.textContent = err2.message || 'Could not create allocation.';
      err.classList.remove('hidden');
      btn.disabled = false;
    }
    return;
  }
  if (act === 'copy') { copy(buyLink(id)); return; }
  if (act === 'del') {
    const a = r.allocations.find(x => x.id === id);
    if (a && a.status === 'funded') return;
    if (a && confirm('Delete the allocation for ' + a.name + '?')) {
      try {
        const result = await PactAPI.deleteAllocation(r.id, id);
        currentRaise = result.raise;
        render();
      } catch (err) {
        toast(err.message || 'Could not delete allocation');
      }
    }
    return;
  }
});

PactSettings.init({ buttonId: 'settingsToggle', onChange: render });
PactWallet.init({
  buttonId: 'walletToggle',
  onChange: account => {
    connectedWallet = account;
    render();
  },
});
loadRaise();
</script>
<script>
  if (['localhost', '127.0.0.1'].includes(location.hostname)) {
    const watch = [location.href, 'app.css', 'api.js', 'wallet.js', 'settings.js', 'dist/onchain.bundle.js'];
    let stamp = null;
    setInterval(async () => {
      try {
        const tags = await Promise.all(watch.map(u => fetch(u, { method: 'HEAD', cache: 'no-store' }).then(r => r.headers.get('last-modified') || r.headers.get('etag') || '')));
        const t = tags.join('|');
        if (stamp && t !== stamp) location.reload();
        stamp = t;
      } catch (e) {}
    }, 1000);
  }
</script>
</body>
</html>
